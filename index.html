<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Googleフォーム埋め込みデモ</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: sans-serif;
      background: #f3f4f6;
      color: #222;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    p {
      margin: 0 0 16px;
    }

    .form-section {
      margin-top: 32px;
      padding: 20px;
      background: #fafafa;
      border: 2px solid #d1d5db;
      border-radius: 12px;
    }

    .form-section-title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: bold;
    }

    .form-section-note {
      margin: 0 0 16px;
      font-size: 14px;
      color: #666;
    }

    .form-frame-wrap {
      padding: 16px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    iframe {
      width: 100%;
      min-height: 1000px;
      border: 0;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>お問い合わせページ</h1>
    <p>こちらはデモ用の公開ページです。</p>

    <div class="form-section">
      <h2 class="form-section-title">お問い合わせフォーム</h2>
      <p class="form-section-note">以下の枠内は Googleフォーム を埋め込んだエリアです。</p>

      <div class="form-frame-wrap">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc3_cCUd7Wrv4BesjpuEfK__INAWVlAgHlpjbco-wa7qkVpxg/viewform?embedded=true" width="640" height="384" frameborder="0" marginheight="0" marginwidth="0">読み込んでいます…</iframe>
      </div>
    </div>
  </div>
</body>
</html>
