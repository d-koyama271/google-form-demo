<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせページ</title>
  <style>
    body {
      margin: 0;
      padding: 30px 24px;
      font-family: sans-serif;
      background: #000;
      color: #fff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: bold;
    }

    .form-section {
      padding: 16px;
      background: #4d9822;
      border-radius: 12px;
      box-sizing: border-box;
    }

    .form-section-title {
      position: relative;
      margin-bottom: 16px;
      font-weight: 900;
      font-size: 220%;
      letter-spacing: 0.1em;
      text-align: center;
    }

    iframe {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      display: block;
      width: 100%;
      min-height: 900px;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Googleフォームデモ</h1>

    <div class="form-section">
      <div class="form-section-title">CONTACT</div>

      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc3_cCUd7Wrv4BesjpuEfK__INAWVlAgHlpjbco-wa7qkVpxg/viewform?embedded=true">読み込んでいます…</iframe>
    </div>
  </div>
</body>

</html>
